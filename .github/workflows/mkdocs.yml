name: Deploy portfolio and MkDocs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip

      - name: Install documentation dependencies
        run: pip install -r requirements.txt

      - name: Import repository READMEs
        run: python scripts/import_readmes.py

      - name: Build MkDocs
        run: mkdocs build --strict --config-file mkdocs.generated.yml

      - name: Assemble complete website
        run: |
          mkdir public
          cp index.html projects.html style.css wip.html public/
          cp -r docs public/docs
          touch public/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
