site_name: mcquerol | Projects
site_description: Repository documentation and project READMEs by Mateo Ceballos Querol
site_url: https://mcquerol.github.io/docs/
repo_url: https://github.com/mcquerol/mcquerol.github.io
repo_name: mcquerol/mcquerol.github.io
edit_uri: edit/main/docs-source/

docs_dir: docs-source
site_dir: docs

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Overview: index.md
  - About: about.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mcquerol

copyright: Copyright &copy; 2026 Mateo Ceballos Querol
